name: Chromatic
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true
# Least privilege: only needs to read the repo to build and upload Storybook.
permissions:
  contents: read
jobs:
  visual:
    runs-on: ubuntu-latest
    # Only runs when the project token secret is configured. Add it under
    # Settings → Secrets and variables → Actions as CHROMATIC_PROJECT_TOKEN
    # (get the token from your project at https://www.chromatic.com).
    if: ${{ vars.CHROMATIC_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Chromatic needs full git history to detect baseline changes.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build Storybook
        run: bun run build-storybook
      - name: Publish to Chromatic
        uses: chromaui/action@7aca53e7aa87489020a97f633c1e7e82c12e5973 # v17.0.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          storybookBuildDir: storybook-static
          exitZeroOnChanges: true
