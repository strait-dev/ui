name: Release
on:
  push:
    branches: [main]
  # Manual trigger: lets a maintainer kick off the Changesets flow on demand
  # (e.g. to cut a release without waiting for the next push to main).
  workflow_dispatch:
# Never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    # Stays dormant until the npm package + trusted publisher are bootstrapped
    # (see RELEASING.md). Set the repo variable RELEASE_ENABLED=true to activate.
    if: vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit version bumps + create git tags
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm OIDC trusted publishing (mints token + provenance)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22 # OIDC requires Node >= 22.14.0
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing needs npm >= 11.5.1, newer than the npm bundled
      # with Node 22. The trusted publisher configured on npmjs.com mints a
      # short-lived token at publish time, so there is deliberately no
      # NODE_AUTH_TOKEN/NPM_TOKEN here, and provenance is attached automatically.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      # On a push that contains changesets, this opens/updates the
      # "Version Packages" PR. When that PR is merged (no changesets left), the
      # publish command runs: `changeset publish` falls back to `npm publish`
      # (it only special-cases pnpm), so OIDC applies. The package's
      # prepublishOnly hook builds dist/ during publish.
      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run version-packages
          publish: bun run release
          # We craft richer, Conventional-Commit-categorized notes ourselves in
          # the next step; let the action publish + tag but not open releases.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # When a publish happened, turn the new CHANGELOG.md section into a
      # categorized GitHub Release (Features / Bug Fixes / Performance / Other)
      # with an install snippet and a full-changelog compare link.
      - name: Publish categorized GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          bun scripts/build-release-notes.mjs \
            --published "$PUBLISHED" \
            --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Pass through env rather than interpolating ${{ }} into the run block
          # (zizmor template-injection).
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
