name: PR Checks
# Lightweight pull-request hygiene gates, kept out of ci.yml so that title and
# label edits don't re-run the full build/test matrix.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pr-title:
    name: PR title is Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Lint PR title
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changeset:
    name: Changeset present
    # Escape hatch: add the `skip-changeset` label for releaseless PRs
    # (docs-only, CI, repo chores).
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Require a changeset
        # Pass the base ref through env, never interpolate ${{ }} directly into a
        # run block (zizmor template-injection): a crafted branch name could
        # otherwise inject shell.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          bunx changeset status --since="origin/$BASE_REF"
