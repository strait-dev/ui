name: CI
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
# Least privilege: CI only reads the repo; no job here writes contents/issues/PRs.
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Biome
        run: bunx @biomejs/biome check .
      - name: Component contract
        run: bun scripts/check-conventions.mjs
      - name: Heavy-dependency isolation
        run: bun scripts/check-heavy-deps.mjs
      - name: Trusted-dependency guard
        run: bun scripts/check-trusted-deps.mjs
      - name: TSDoc coverage
        run: bun scripts/check-docs.mjs
      - name: Changeset format
        run: bun scripts/check-changeset-format.mjs
      - name: Release-notes generator tests
        run: node --test scripts/release-notes.test.mjs
      - name: Docs artifact drift
        run: bun scripts/generate-llms.ts --check
      - name: Build package
        run: bun run --filter @strait/ui build
      - name: Typecheck
        run: bun run --filter @strait/ui typecheck
      - name: Unit tests
        run: bun run --filter @strait/ui test
      - name: Build Storybook
        run: bun run build-storybook

  interaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Story interaction tests
        run: bun run --filter @strait/storybook test-storybook

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Build & serve Storybook, run a11y scan
        run: |
          bun run build-storybook
          bunx http-server apps/storybook/storybook-static -p 6006 &
          bunx wait-on http://localhost:6006/index.json
          bun scripts/a11y-scan.mjs
          bun scripts/a11y-scan.mjs --theme dark
      - name: Fail on serious/critical findings
        run: |
          COUNT=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('scripts/a11y-report.json')).filter(f=>f.impact==='serious'||f.impact==='critical').length)")
          echo "serious/critical findings: $COUNT"
          test "$COUNT" = "0"

  zizmor:
    name: Zizmor (GitHub Actions security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      # Static analysis of our own workflows. advanced-security: false makes the
      # action fail the build on findings (exit codes 11-14) instead of only
      # uploading SARIF to code scanning. version pins the zizmor tool itself;
      # suppressions live in .github/zizmor.yml.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: 1.25.2
          advanced-security: false
          token: ${{ secrets.GITHUB_TOKEN }}
